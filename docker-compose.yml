    command: ["--keys", "devkey: secret", "--dev"]
    ports:
      - "7880:7880"
      - "7881:7881"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7880/ || true"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

