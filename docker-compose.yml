      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # =============================================================================
  # AppAPI External Apps (ExApps) Infrastructure
  # =============================================================================

  # HaRP - High-performance AppAPI Reverse Proxy (Recommended Deploy Daemon)
  # Manages ExApp containers and routes requests
  # Documentation: https://github.com/nextcloud/HaRP
  harp:
    profiles:
      - exapps
    image: ghcr.io/nextcloud/nextcloud-appapi-harp:release
    container_name: openregister-harp
    restart: always
    ports:
      - "8780:8780"   # HaRP API port
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - harp-data:/data
    environment:
      # HaRP configuration (required)
      - HP_SHARED_KEY=harp-secret-change-me
      - NC_INSTANCE_URL=http://nextcloud
      - HP_EXAPPS_ADDRESS=0.0.0.0:8780
      - HP_FRP_ADDRESS=0.0.0.0:8782
      - HP_LOG_LEVEL=info
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8780/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Docker Socket Proxy - Alternative Deploy Daemon (Legacy)
  # Use if HaRP doesn't work in your environment
  # Documentation: https://github.com/nextcloud/docker-socket-proxy
  docker-socket-proxy:
    profiles:
      - exapps-legacy
    image: ghcr.io/nextcloud/docker-socket-proxy:latest
    container_name: openregister-docker-socket-proxy
    restart: always
    ports:
      - "2375:2375"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - HAPROXY_PASSWORD=docker-proxy-secret-change-me
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:2375/_ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

