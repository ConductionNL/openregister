    healthcheck:
      test: ["CMD", "python3", "-c", "import os,urllib.request,urllib.error\ntry: urllib.request.urlopen('http://127.0.0.1:'+os.environ.get('APP_PORT','23000')+'/heartbeat')\nexcept urllib.error.HTTPError: pass"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # =============================================================================
  # ExApp Shared Infrastructure
  # Start with: docker-compose --profile commonground up
  # =============================================================================

  # Greenmail — In-memory SMTP/IMAP/POP3 server for integration tests
  # Start with: docker-compose --profile mail up -d
  # Seed test mailboxes via: bash docker/mail/seed-mail.sh
  # Auto-creates accounts on first message; login = email = password.
  # Used by `nextcloud-entity-relations` integration tests
  # (`tests/Service/MailRelationsIntegrationTest.php`) — tests skip
  # gracefully when this container is not running.
  greenmail:
    profiles:
      - mail
    image: greenmail/standalone:2.1.0
    container_name: openregister-greenmail
    restart: unless-stopped
    environment:
      - GREENMAIL_OPTS=-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users.login=email -Dgreenmail.auth.disabled
    ports:
      - "3025:3025"  # SMTP
      - "3110:3110"  # POP3
      - "3143:3143"  # IMAP
      - "3465:3465"  # SMTPS
      - "3993:3993"  # IMAPS
      - "3995:3995"  # POP3S
      - "8088:8080"  # Greenmail HTTP API (for inbox inspection in tests)
    healthcheck:
      test: ["CMD", "sh", "-c", "echo > /dev/tcp/127.0.0.1/3025"]
      interval: 10s
      timeout: 5s
      retries: 5

