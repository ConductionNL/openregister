  # Start with: docker-compose --profile valtimo up
  # Access at: http://localhost:8088
  # NC integration: custom app valtimo (mounted as custom_app)
  # Documentation: https://docs.valtimo.nl/
  # Note: Requires Keycloak for authentication - uses simplified dev setup
  valtimo:
    profiles:
      - valtimo
      - commonground
      - integrations
    image: ritense/gzac-backend:latest
    container_name: openregister-valtimo
    restart: always
    ports:
      - "8088:8080"
    volumes:
      - valtimo-data:/data
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/valtimo
      - SPRING_DATASOURCE_USERNAME=nextcloud
      - SPRING_DATASOURCE_PASSWORD=!ChangeMe!
      - VALTIMO_APP_HOSTNAME=http://localhost:8088
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
