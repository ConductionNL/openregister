      - APP_VERSION=1.0.0
      - APP_HOST=0.0.0.0
      - APP_PORT=23005
      - APP_PERSISTENT_STORAGE=/data
      - APP_SECRET=HGF41cZ42HnNoA4eWUqhMquI9RFnk206ZVtJyT/1xK+X3u1bvSiyRdlfJlxL7YLn8uTMpKh/Bqb9VGKkRYAaoQUj6xtIcCdx4hTBJDrspEPTBgVbAF6/sg/VL6oNdhmv
      - NEXTCLOUD_URL=http://nextcloud
      # OpenTalk Controller config is in controller.toml
      # Env vars with OPENTALK_CTRL_ prefix override entire TOML sections, so avoid them
      # Keycloak OIDC Configuration
      - KEYCLOAK_URL=http://openregister-exapp-keycloak:8080
      - KEYCLOAK_REALM=commonground
      - KEYCLOAK_CLIENT_ID=opentalk-controller
      - KEYCLOAK_CLIENT_SECRET=opentalk-secret
      # Browser-accessible Keycloak URL for OIDC flows (not docker-internal)
      - KEYCLOAK_BROWSER_URL=http://localhost:8180
      # Keycloak ExApp URL for server-side token acquisition
      - KEYCLOAK_EXAPP_URL=http://openregister-exapp-keycloak:23002
      # Shared secret for ExApp-to-ExApp API calls
      - KEYCLOAK_API_SECRET=keycloak-exapp-internal-secret
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      exapp-redis:
        condition: service_healthy
      exapp-keycloak:
        condition: service_healthy
      exapp-livekit:
        condition: service_healthy
      exapp-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import os,urllib.request,urllib.error\ntry: urllib.request.urlopen('http://127.0.0.1:'+os.environ.get('APP_PORT','23000')+'/heartbeat')\nexcept urllib.error.HTTPError: pass"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
