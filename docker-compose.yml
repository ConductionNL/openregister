  # Access at: http://localhost:8089
  # NC integration: custom app openzaak (mounted as custom_app)
  # Documentation: https://open-zaak.readthedocs.io/
  # APIs: Zaken, Documenten, Catalogi, Besluiten, Autorisaties
  openzaak:
    profiles:
      - openzaak
      - commonground
      - integrations
    image: openzaak/open-zaak:latest
    container_name: openregister-openzaak
    restart: always
    ports:
      - "8089:8000"
    volumes:
      - openzaak-data:/app/private-media
    environment:
      - DB_HOST=db
      - DB_NAME=openzaak
      - DB_USER=nextcloud
      - DB_PASSWORD=!ChangeMe!
      - SECRET_KEY=openzaak-secret-change-me
      - ALLOWED_HOSTS=*
      - DJANGO_SETTINGS_MODULE=openzaak.conf.docker
      - IS_HTTPS=no
      - CACHE_DEFAULT=db
      - CACHE_AXES=db
    depends_on:
      - db
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

