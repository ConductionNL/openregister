name: Code Quality

on:
  push:
    branches: [main, beta, development, feature/**, bugfix/**, hotfix/**]
  pull_request:
    types: [opened, reopened]
    branches: [main, beta, development]
  workflow_dispatch:

concurrency:
  group: quality-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  quality:
    if: github.event_name != 'push' || github.event.created != true
    uses: ConductionNL/.github/.github/workflows/quality.yml@main
    with:
      app-name: openregister
      php-version: "8.3"
      php-test-versions: '["8.3", "8.4"]'
      nextcloud-test-refs: '["stable32"]'
      enable-psalm: true
      enable-phpstan: true
      enable-phpmetrics: true
      enable-frontend: true
      enable-eslint: true
      enable-phpunit: true
      enable-newman: false  # Newman runs in its own workflow (api-test-coverage.yml) with the orchestrator + docker-compose stack.
      enable-coverage-guard: true
      enable-sbom: true
