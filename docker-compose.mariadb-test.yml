# OpenRegister MariaDB Testing Stack
# This docker-compose file is for testing MariaDB compatibility
# It runs on different ports to avoid conflicts with the main PostgreSQL setup
#
# Usage:
#   docker-compose -f docker-compose.mariadb-test.yml up -d
#
# Access:
#   - Nextcloud: http://localhost:8090
#   - MariaDB: localhost:3307
#   - Presidio: http://localhost:5002

volumes:
  nextcloud-mariadb:
  db-mariadb:

services:
  # MariaDB Database for testing
  db-mariadb-test:
    image: mariadb:11.2
    restart: always
    container_name: openregister-mariadb-test
    volumes:
      - db-mariadb:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=!ChangeMe!
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=!ChangeMe!
    ports:
      - "3307:3306"
    command: >
      --transaction-isolation=READ-COMMITTED
      --log-bin=binlog
      --binlog-format=ROW
      --innodb-file-per-table=1
      --max-connections=200
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=64M
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Presidio Analyzer for PII detection (separate instance for MariaDB testing)
  presidio-analyzer-test:
    image: mcr.microsoft.com/presidio-analyzer:latest
    container_name: openregister-presidio-analyzer-test
    restart: always
    ports:
      - "5002:3000"
    environment:
      - PORT=3000
      - LOG_LEVEL=INFO
      - PRESIDIO_ANALYZER_LANGUAGES=en,nl,de,fr,es
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import requests; requests.get('http://localhost:3000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Nextcloud with MariaDB for testing
  nextcloud-mariadb-test:
    user: root
    container_name: nextcloud-mariadb-test
    image: nextcloud
    restart: always
    ports:
      - 8090:80
    links:
      - db-mariadb-test
      - presidio-analyzer-test
    volumes:
      - nextcloud-mariadb:/var/www/html:rw
      - ./custom_apps:/var/www/html/custom_apps
      - .:/var/www/html/custom_apps/openregister
    environment:
      # Database configuration (MariaDB)
      - MYSQL_DATABASE=nextcloud
      - MYSQL_USER=nextcloud
      - MYSQL_PASSWORD=!ChangeMe!
      - MYSQL_HOST=db-mariadb-test
      - TZ=Europe/Amsterdam
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin
      # PHP Configuration
      - PHP_MEMORY_LIMIT=4G
      - PHP_UPLOAD_LIMIT=2G
      - PHP_POST_MAX_SIZE=2G
      # AI Service endpoints (use test Presidio instance)
      - PRESIDIO_URL=http://openregister-presidio-analyzer-test:3000
    depends_on:
      db-mariadb-test:
        condition: service_healthy
